version: '3.8'

services:
    mongo:
        image: mongo:7
        container_name: qrassistance-mongo
        restart: always
        ports:
          - "27017:27017"
        volumes:
          - ./mongodb_data:/data/db
        environment:
          MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
          MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
          MONGO_INITDB_DATABASE: ${MONGONAME}
